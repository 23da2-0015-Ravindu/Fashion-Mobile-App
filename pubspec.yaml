name: fashion_app
description: Minimal fashion e-commerce Flutter app (assignment).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.20.2
  confetti: ^0.8.0
  firebase_storage: ^13.2.0
  image_picker: ^1.2.1
  image_cropper: ^12.2.0
  image_cropper_for_web: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#FAFAFA"
  image: assets/images/splash-screen.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FAFAFA"
    image: assets/images/splash-screen.png
